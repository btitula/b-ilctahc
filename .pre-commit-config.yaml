# pre-commit hook configuration
# Install:  pip install pre-commit detect-secrets semgrep && pre-commit install --hook-type pre-commit --hook-type pre-push
# Update:   pre-commit autoupdate
# Run now:  pre-commit run --all-files

repos:

  # ── 1. Gitleaks — hardcoded secrets / API keys ──────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)
        stages: [pre-commit, pre-push]

  # ── 2. detect-secrets — entropy + pattern scanner ───────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (entropy scan)
        args: ["--baseline", ".secrets.baseline"]
        stages: [pre-commit]
        exclude: |
          (?x)^(
            config\.yaml\.example|
            \.secrets\.baseline
          )$

  # ── 3. Semgrep — secrets + Python security rules (uses system install) ───────
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (secrets + security)
        language: system
        entry: semgrep
        args:
          - --config=p/secrets
          - --config=p/python
          - --error
          - --quiet
        types: [python]
        stages: [pre-commit, pre-push]

  # ── 4. Gitleaks: scan committed (not-yet-pushed) history on pre-push ─────────
  - repo: local
    hooks:
      - id: gitleaks-push-history
        name: gitleaks (scan commits to be pushed)
        language: script
        entry: scripts/gitleaks-push-scan.sh
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  # ── 5. Built-in hygiene checks ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
